apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: primeclaims.demo.example.com
spec:
  group: demo.example.com
  names:
    kind: PrimeClaim
    listKind: PrimeClaimList
    plural: primeclaims
    singular: primeclaim
    shortNames:
      - pc
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Prime
          type: integer
          jsonPath: .status.prime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [requester]
              properties:
                requester:
                  type: string
                  description: Name of the team or service claiming the prime.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Allocated, Error]
                prime:
                  type: integer
                  description: The allocated prime number.
                lastSyncTime:
                  type: string
                error:
                  type: string
