apiVersion: v1
kind: ServiceAccount
metadata:
  name: prime-controller
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prime-controller
rules:
  # Watch and patch PrimeClaim CRs (and their status)
  - apiGroups: [demo.example.com]
    resources: [primeclaims, primeclaims/status]
    verbs: [get, list, watch, patch, update]
  # kopf coordination: events
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch, get, list, watch]
  # kopf coordination: configmaps (progress/locks)
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  # kopf coordination: leases
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # kopf needs to watch namespaces
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prime-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prime-controller
subjects:
  - kind: ServiceAccount
    name: prime-controller
    namespace: demo
